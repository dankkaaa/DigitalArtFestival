services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

  web:
    build: .
    env_file: .env
    depends_on:
      - db
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    command: sh -c "/app/docker/entrypoint.sh"

volumes:
  pg_data:
  media_data: