{% extends "base.html" %}
{% block title %}Generative Stage{% endblock %}

{% block content %}
<div class="hero" style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
  <div>
    <h2 style="margin:0 0 6px 0;">Generative Stage</h2>
    <p class="muted" style="margin:0;">Двигай мышь • Space меняет режим • Новый seed — новая композиция</p>
    <div class="muted" id="info" style="margin-top:8px; font-size:14px;"></div>
  </div>

  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button class="button" id="newSeedBtn" type="button">Новый seed</button>
    <button class="button" id="toggleBtn" type="button">Пауза</button>
    <button class="button" id="saveBtn" type="button">Сохранить PNG</button>
    <button class="button" id="fsBtn" type="button">Полный экран</button>
  </div>
</div>

<div class="card" style="padding:0; overflow:hidden;">
  <canvas id="c" style="width:100%; height:70vh; display:block;"></canvas>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: true });

const infoEl = document.getElementById("info");
const newSeedBtn = document.getElementById("newSeedBtn");
const toggleBtn = document.getElementById("toggleBtn");
const saveBtn = document.getElementById("saveBtn");
const fsBtn = document.getElementById("fsBtn");

let W = 0, H = 0;

function resize(){
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  W = canvas.width;
  H = canvas.height;
}
window.addEventListener("resize", resize);
resize();

let mouse = { x: 0.5, y: 0.5, inside: false };
let seed = 12345;
let mode = 0;
let t = 0;

let running = true;

function updateInfo(){
  infoEl.textContent = `seed=${seed} • mode=${mode} • Space — режим`;
}
updateInfo();

// Слушаем мышь НА CANVAS — это ключевой фикс
canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / rect.width;
  mouse.y = (e.clientY - rect.top) / rect.height;
  mouse.inside = true;
});
canvas.addEventListener("mouseleave", () => {
  mouse.inside = false;
});

window.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    mode = (mode + 1) % 3;
    updateInfo();
  }
});

async function newSeed(){
  const r = await fetch("/gen/api/seed/");
  const data = await r.json();
  seed = data.seed;
  t = 0;
  ctx.clearRect(0, 0, W, H);
  updateInfo();
}
newSeedBtn.addEventListener("click", newSeed);

// Пауза / Пуск
toggleBtn.addEventListener("click", () => {
  running = !running;
  toggleBtn.textContent = running ? "Пауза" : "Пуск";
  if (running) requestAnimationFrame(draw);
});

// Сохранить PNG
saveBtn.addEventListener("click", () => {
  const a = document.createElement("a");
  a.download = `generative_${seed}.png`;
  a.href = canvas.toDataURL("image/png");
  a.click();
});

// Полный экран (для контейнера canvas)
fsBtn.addEventListener("click", async () => {
  const box = canvas.parentElement; // .card
  try {
    if (!document.fullscreenElement) await box.requestFullscreen();
    else await document.exitFullscreen();
  } catch (e) {}
  setTimeout(resize, 200);
});

// Детерминированный псевдослучайный генератор (seed реально влияет)
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let r = Math.imul(a ^ a >>> 15, 1 | a);
    r ^= r + Math.imul(r ^ r >>> 7, 61 | r);
    return ((r ^ r >>> 14) >>> 0) / 4294967296;
  }
}

function draw(){
  // если css-область изменилась — подхватим (иногда flex/шрифты меняют высоту)
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const needW = Math.floor(rect.width * dpr);
  const needH = Math.floor(rect.height * dpr);
  if (needW !== W || needH !== H) resize();

  // фон: шлейф
  ctx.fillStyle = "rgba(8, 8, 14, 0.18)";
  ctx.fillRect(0, 0, W, H);

  const cx = (mouse.inside ? mouse.x : 0.5) * W;
  const cy = (mouse.inside ? mouse.y : 0.5) * H;

  const rnd = mulberry32(seed);
  t += 0.012;

  const count = 520;
  for (let i = 0; i < count; i++){
    const a = (i / count) * Math.PI * 2 + t * (0.7 + rnd() * 0.8);
    const r = (0.12 + rnd() * 0.88) * Math.min(W, H) * (0.18 + 0.22 * Math.sin(t + seed * 0.00001));

    const wobble = (rnd() - 0.5) * 160 * (0.15 + (mouse.inside ? mouse.y : 0.5));
    const x = cx + Math.cos(a) * r + wobble;
    const y = cy + Math.sin(a) * r - wobble;

    const size = 1 + rnd() * 3 + 6 * (mouse.inside ? mouse.x : 0.5);
    const alpha = 0.05 + rnd() * 0.22;

    if (mode === 0) ctx.fillStyle = `rgba(0, 230, 255, ${alpha})`;
    if (mode === 1) ctx.fillStyle = `rgba(255, 120, 220, ${alpha})`;
    if (mode === 2) ctx.fillStyle = `rgba(0, 255, 160, ${alpha})`;

    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }

  if (running) requestAnimationFrame(draw);
}

draw();
</script>
{% endblock %}
